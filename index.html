<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicA++ AI | Viral Video Clipper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #070b14; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .viral-badge { background: linear-gradient(90deg, #f59e0b, #ef4444); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto space-y-8">
        <header class="text-center">
            <h1 class="text-4xl font-extrabold tracking-tight text-white">LogicA++ <span class="text-blue-500">AI</span></h1>
            <p class="text-gray-400 mt-2">Automatic Viral Clip Generator</p>
        </header>

        <div class="glass p-8 rounded-3xl shadow-2xl space-y-6">
            <div class="space-y-4">
                <label class="block text-sm font-semibold text-gray-300">Paste Link Video (YouTube/TikTok/Reels)</label>
                <div class="flex flex-col md:flex-row gap-3">
                    <input id="videoUrl" type="text" placeholder="https://www.youtube.com/watch?v=..." 
                        class="flex-1 bg-slate-900 border border-slate-700 rounded-xl p-4 text-sm outline-none focus:border-blue-500 transition-all">
                    <button onclick="analisaViral()" class="btn-primary text-white font-bold px-8 py-4 rounded-xl text-sm">
                        GENERATE CLIPS
                    </button>
                </div>
                <div class="text-center text-gray-500 text-xs">Atau klik untuk <span class="text-blue-400 underline cursor-pointer">Upload File Video</span></div>
            </div>
        </div>

        <div id="loadingStatus" class="hidden text-center space-y-4">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-blue-500 border-r-2 border-transparent"></div>
            <p id="statusText" class="text-sm text-blue-400 italic font-medium">AI sedang membedah video...</p>
        </div>

        <div id="resultArea" class="hidden space-y-6">
            <h3 class="text-xl font-bold text-white flex items-center gap-2">
                <span class="viral-badge text-[10px] px-2 py-1 rounded-full uppercase">AI Recommended</span>
                Opsi Potongan Viral
            </h3>
            
            <div id="clipList" class="grid gap-4">
                </div>
        </div>
    </div>

    <script>
        async function panggilGemini(promptUser) {
    // Kita panggil jalur internal Vercel, bukan URL Google langsung
    const url = "/api/generate"; 

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: promptUser }] }]
            })
        });

        const data = await response.json();

        if (data.error) {
            return "Error: " + data.error.message;
        }

        if (data.candidates && data.candidates[0].content.parts[0].text) {
            return data.candidates[0].content.parts[0].text;
        }
        
        return "AI tidak memberikan respon.";
    } catch (err) {
        return "Gagal koneksi ke API: " + err.message;
    }
}

        async function analisaViral() {
            const url = document.getElementById('videoUrl').value;
            if(!url) return alert("Paste dulu link videonya!");

            // Reset Tampilan
            document.getElementById('loadingStatus').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('clipList').innerHTML = '';

            // Tahap 1: Simulasi AI Mendeteksi Video
            // Logikanya: Kita kirim URL ke Gemini, Gemini minta transkrip, lalu hitung rating viral.
            const statusText = document.getElementById('statusText');
            
            setTimeout(() => { statusText.innerText = "Mencari momen emosional dan viral..."; }, 1500);
            setTimeout(() => { statusText.innerText = "Menghitung skor retention video..."; }, 3000);

            setTimeout(() => {
                document.getElementById('loadingStatus').classList.add('hidden');
                document.getElementById('resultArea').classList.remove('hidden');

                // Simulasi Hasil Rekomendasi AI
                const rekomendasi = [
                    { start: "02:15", end: "03:10", rating: "98%", desc: "Momen Lucu (Puncak Komedi)" },
                    { start: "05:40", end: "06:30", rating: "85%", desc: "Edukasi / Point Penting" },
                    { start: "00:10", end: "00:55", rating: "72%", desc: "Intro Menarik (Hook)" }
                ];

                rekomendasi.forEach((item, index) => {
                    const card = `
                        <div class="glass p-5 rounded-2xl flex justify-between items-center hover:border-blue-500/50 transition-all cursor-pointer group">
                            <div class="space-y-1">
                                <div class="flex items-center gap-2">
                                    <span class="text-blue-400 font-bold">Opsi ${index+1}</span>
                                    <span class="text-xs bg-green-500/20 text-green-400 px-2 py-0.5 rounded border border-green-500/30">${item.rating} Viral Score</span>
                                </div>
                                <p class="text-sm font-medium text-white">${item.desc}</p>
                                <p class="text-xs text-gray-500 italic">Durasi: ${item.start} - ${item.end}</p>
                            </div>
                            <button class="bg-white text-black text-xs font-bold px-4 py-2 rounded-lg group-hover:bg-blue-500 group-hover:text-white transition-all">
                                CLIP & DOWNLOAD
                            </button>
                        </div>
                    `;
                    document.getElementById('clipList').innerHTML += card;
                });
            }, 5000);
        }
    </script>
</body>
</html>
